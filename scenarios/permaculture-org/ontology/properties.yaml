email:
  type: email
  description: Primary contact email
joined_at:
  type: date
  description: When the entity joined the community
created_at:
  type: timestamp
  description: When this record was created
pronouns:
  type: string
  required: false
  description: Preferred pronouns
skills:
  type: string
  required: false
  description: Free-form comma-separated tags (pruning, beekeeping, carpentry...)
zone:
  type: enum
  values: ["0", "1", "2", "3", "4", "5"]
  description: Permaculture zone (0 = home, 5 = wild) — stored as string for schema compatibility
