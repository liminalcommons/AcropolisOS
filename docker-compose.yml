# acropolisOS single-host install (US-036).
#
# Goal: `docker-compose up` on a fresh checkout reaches http://localhost:3030/setup
# within ~60s without anyone touching Node, Postgres, or Inngest manually.

services:
  postgres:
    image: postgres:16-alpine
    container_name: acropolisos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acropolisos
      POSTGRES_PASSWORD: acropolisos
      POSTGRES_DB: acropolisos
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Host port mapping intentionally removed — host 5432 may already be in
    # use by another Postgres instance. The app reaches this container at
    # postgres:5432 over the internal Docker network. To connect from the
    # host, uncomment the `ports:` block below.
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acropolisos -d acropolisos"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acropolisos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://acropolisos:acropolisos@postgres:5432/acropolisos
      INNGEST_BASE_URL: http://inngest:8288
      NODE_ENV: production
      PORT: "3030"
      # Inside Docker the app sees host `app:3030`. AuthJS refuses to issue
      # session callbacks against an "untrusted" host and logs a stack trace
      # on every request without this. Override in .env for non-localhost
      # installs (e.g. AUTH_URL=https://acropolisos.example.com behind a
      # reverse proxy).
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "http://localhost:3030"
      # Inngest client defaults to "cloud mode" and complains about a
      # missing signing key on every request. We ship a self-hosted Inngest
      # dev server in this compose, so dev mode is correct here.
      INNGEST_DEV: "1"
    env_file:
      - .env
    volumes:
      - ./ontology:/app/ontology
      - ./functions:/app/functions
      - ./uploads:/app/uploads
      # .env is bind-mounted read-write so the setup wizard can persist
      # LLM_* keys back to it (docker-compose re-reads it on `compose up`).
      - ./.env:/app/.env
      - appdata:/app/data
    ports:
      - "3030:3030"

  inngest:
    image: inngest/inngest:latest
    container_name: acropolisos-inngest
    restart: unless-stopped
    command: inngest dev -u http://app:3030/api/inngest --no-discovery
    depends_on:
      - app
    ports:
      - "8288:8288"

volumes:
  pgdata:
  appdata:
