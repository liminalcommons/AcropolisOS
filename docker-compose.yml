# acropolisOS single-host install (US-036).
#
# Goal: `docker-compose up` on a fresh checkout reaches http://localhost:3030/setup
# within ~60s without anyone touching Node, Postgres, or Inngest manually.

services:
  postgres:
    image: postgres:16-alpine
    container_name: acropolisos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acropolisos
      POSTGRES_PASSWORD: acropolisos
      POSTGRES_DB: acropolisos
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Host port mapping intentionally removed — host 5432 may already be in
    # use by another Postgres instance. The app reaches this container at
    # postgres:5432 over the internal Docker network. To connect from the
    # host, uncomment the `ports:` block below.
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acropolisos -d acropolisos"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acropolisos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://acropolisos:acropolisos@postgres:5432/acropolisos
      INNGEST_BASE_URL: http://inngest:8288
      # 0c-pre: dev mode so Next.js watches bind-mounted source files.
      # Switch back to production + `npm run start` for prod deploys (rebuild
      # image first so .next/ is current). In dev mode next dev compiles on
      # demand; no pre-built .next/ needed.
      NODE_ENV: development
      PORT: "3030"
      # Inside Docker the app sees host `app:3030`. AuthJS refuses to issue
      # session callbacks against an "untrusted" host and logs a stack trace
      # on every request without this. Override in .env for non-localhost
      # installs (e.g. AUTH_URL=https://acropolisos.example.com behind a
      # reverse proxy).
      AUTH_TRUST_HOST: "true"
      # Behind the cloudflared tunnel (acropolisos.castalia.one). AuthJS uses this
      # as the canonical base, so post-login redirects + session cookies land on
      # the public host instead of localhost:3030 (which a remote browser can't
      # reach). Revert to http://localhost:3030 for purely-local use.
      AUTH_URL: "https://acropolisos.castalia.one"
      # Inngest client defaults to "cloud mode" and complains about a
      # missing signing key on every request. We ship a self-hosted Inngest
      # dev server in this compose, so dev mode is correct here.
      INNGEST_DEV: "1"
    # 0c-pre: override Dockerfile CMD (next start) with next dev so file
    # watcher picks up bind-mounted source changes without image rebuild.
    # Revert to `npm run start` (or remove this key) for prod installs after
    # rebuilding the image.
    command: npm run dev
    env_file:
      - .env
    volumes:
      - ./ontology:/app/ontology
      - ./functions:/app/functions
      - ./uploads:/app/uploads
      # drizzle/ is bind-mounted so DiffMigrationRunner.persist() can write
      # drizzle/<tag>.sql + append meta/_journal.json on the host after every
      # apply. Without this the SQL artifacts vanish on container rebuild.
      - ./drizzle:/app/drizzle
      # .env is bind-mounted read-write so the setup wizard can persist
      # LLM_* keys back to it (docker-compose re-reads it on `compose up`).
      - ./.env:/app/.env
      - appdata:/app/data
      # 0c-pre (cycle-5): source directories bind-mounted so host edits are
      # visible in the container without image rebuild. node_modules/ and
      # .next/ are NOT bind-mounted — those are build artifacts that must
      # live in the image layer (node_modules) or be rebuilt by next dev
      # (.next). The anonymous volume below protects .next/ from being
      # shadowed by an empty host path if one were accidentally created.
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./scripts:/app/scripts
      # S4 demote: scenario bundles (scenarios/<name>/{ontology,seed}) replaced
      # the baked seed/ dir. Bind-mount so the dev container sees them without an
      # image rebuild (the Dockerfile COPYs scenarios/ for prod images).
      - ./scenarios:/app/scenarios
      # Protect the compiled .next/ dir from host-side shadowing.
      - nexttmp:/app/.next
    ports:
      - "3030:3030"
    healthcheck:
      # Inngest polls /api/inngest every 5s for registration. The app needs
      # to be HTTP-ready before that polling reaches it, otherwise the first
      # few polls fail and side-effect dispatch is delayed. Healthcheck +
      # depends_on: condition: service_healthy on inngest below ensures
      # ordering.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3030/api/auth/csrf"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  inngest:
    image: inngest/inngest:latest
    container_name: acropolisos-inngest
    restart: unless-stopped
    # --no-discovery disables network scanning for OTHER apps. The --sdk-url
    # (-u) flag below tells Inngest to sync THIS one app explicitly, polled
    # every 5s (--no-poll defaults to false). I4 (May 2026): verified via
    # GraphQL probe that the app registers automatically; --no-discovery is
    # correct for the single-host install.
    command: inngest dev -u http://app:3030/api/inngest --no-discovery
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8288:8288"

  n8n:
    image: n8nio/n8n:latest
    container_name: acropolisos-n8n
    restart: unless-stopped
    # n8n v2 uses built-in user-management (owner account set up on first run
    # at the editor). Host port bound to 127.0.0.1 so only the operator's
    # browser on this machine can reach the setup screen — LAN peers cannot.
    # Step 2b (MCP shim) reaches n8n via internal DNS http://n8n:5678.
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      # Pin encryption key so stored credentials survive container recreate:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-acropolis-n8n-dev-key-change-in-prod}
    volumes:
      - n8n_data:/home/node/.n8n
    # n8n uses its own SQLite by default — no dependency on postgres this cycle.
    # Pointing n8n at the shared Postgres is a later optimization (step 2b+).

volumes:
  pgdata:
  appdata:
  # Named volume for .next/ so the Next.js dev compiler writes into it
  # without risk of a host bind-mount shadowing the build output directory.
  nexttmp:
  n8n_data:
