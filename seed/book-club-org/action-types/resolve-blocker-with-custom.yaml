resolve_blocker_with_custom:
  description: |
    Human picked "Other (write your own)" escape hatch. Lets the human
    invoke any action they're permitted to invoke as the resolution;
    that action_audit becomes resolved_by_action_audit_id.
    member_self: actor must be the blocker's blocked_actor_id.
  function: resolve-blocker-with-custom
  parameters:
    blocker_id:
      type: ref
      target: AgentBlocker
      required: true
    action_invocation: { type: string, required: true, description: "JSON-encoded { action_type, params }" }
  permissions: [member_self]
  agent_policy: always_confirm
  side_effects: [audit, notify_member]
  row_confirm:
    source: confirm_action
    invocation_param: action_invocation
