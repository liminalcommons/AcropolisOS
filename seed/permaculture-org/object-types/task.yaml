Task:
  description: A unit of work that can be claimed by a member
  title_property: title
  permissions:
    read: ["*"]
    write: [steward, coordinator, member_self]
  properties:
    id:
      type: uuid
      primary_key: true
    title:
      type: string
    kind:
      type: enum
      values: [planting, weeding, harvest, mulching, watering, building, facilitation, maintenance, outreach]
    estimated_hours:
      type: decimal
      default: 1
    work_party:
      type: ref
      target: WorkParty
      required: false
    site:
      type: ref
      target: Site
      required: false
    claimed_by:
      type: ref
      target: Member
      required: false
    status:
      type: enum
      values: [open, claimed, in_progress, done, cancelled]
      default: open
