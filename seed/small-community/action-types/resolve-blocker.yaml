resolve_blocker_with_pathway:
  description: |
    Human picked one of the agent's curated paths. Middleware fires the
    pathway's typed action, sets resolved_via_pathway_id, flips status,
    and backfills resolved_by_action_audit_id.
  function: resolve-blocker-with-pathway
  parameters:
    blocker_id:
      type: ref
      target: AgentBlocker
      required: true
    pathway_id: { type: uuid, required: true }
  permissions: [member_self]
  agent_policy: always_confirm
  side_effects: [audit, notify_member]
