pin_widget_to_member_context:
  description: Append a widget to the member's pinned_widgets array.
  function: pin-widget-to-member-context
  parameters:
    member_id:
      type: ref
      target: Member
      required: false
    widget:
      type: string
      required: true
      description: JSON-encoded { kind, config? } — server assigns id.
  permissions: [member_self]
  agent_policy: auto_apply
  side_effects: [audit]
