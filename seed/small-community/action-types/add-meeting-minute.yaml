add_meeting_minute:
  description: Capture meeting minutes for an event
  creates_object: MeetingMinute
  parameters:
    title:
      type: string
      required: true
    body:
      type: string
      required: true
    event:
      type: ref
      target: Event
      required: true
  permissions: [steward, member]
  agent_policy: always_confirm
  side_effects: [audit]
