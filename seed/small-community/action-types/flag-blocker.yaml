flag_blocker:
  description: |
    Agent-invoked: the agent has hit a wall only `blocked_actor_id` can
    clear. Creates an AgentBlocker row and notifies the human.
  function: flag-blocker
  parameters:
    blocked_actor_id:
      type: ref
      target: Member
      required: true
    reason_kind:
      type: enum
      values: [approval, confirmation, ambiguity, missing_data, consent, decision, risky_action]
      required: true
    summary:
      type: string
      required: true
    detail:
      type: string
      required: true
    blocked_work_ref:
      type: string
      required: false
    resolution_mode:
      type: enum
      values: [pathways, text_input, confirm_binary]
      required: false
      default: pathways
    pathways:
      type: string
      required: false
      description: JSON array of pathway objects. DB column is jsonb.
    input_schema:
      type: string
      required: false
      description: JSON object for text_input resolution. DB column is jsonb.
    confirm_action:
      type: string
      required: false
      description: JSON object for confirm_binary resolution. DB column is jsonb.
  permissions: [steward]
  agent_policy: auto_apply
  side_effects: [audit, notify_member]
