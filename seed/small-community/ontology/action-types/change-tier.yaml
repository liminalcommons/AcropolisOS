change_tier:
  description: Move a member to a different tier
  function: change-tier
  parameters:
    member:
      type: ref
      target: Member
      required: true
    new_tier:
      type: enum
      values: [basic, sustaining, lifetime]
      required: true
  permissions: [steward]
  agent_policy: always_confirm
  side_effects: [audit, in_app_notification]
