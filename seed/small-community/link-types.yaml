attended:
  from: Member
  to: Event
  cardinality: many-to-many
  description: A member attended an event
  properties:
    attended_at:
      type: timestamp
    role:
      type: enum
      values: [attendee, organizer, speaker]
      default: attendee

authored:
  from: Member
  to: MeetingMinute
  cardinality: one-to-many
  description: A member authored a meeting minute
