MemberContext:
  description: |
    One row per Member; auto-created on first /me visit or first
    query_member_context call. Holds the member's `pinned_widgets`
    layered on top of the always-on default widget set.
  title_property: id
  permissions:
    read: ["steward", "member_self"]
    write: ["steward", "member_self"]
  properties:
    id:
      type: uuid
      primary_key: true
    member_id:
      type: ref
      target: Member
      unique: true
    pinned_widgets:
      type: jsonb
      default: "[]"
      description: |
        Array of { id, kind, config } widget descriptors appended after
        the default widget set in /me render order.
    created_at:
      ref: created_at
    updated_at:
      ref: updated_at
  indexes:
    - { name: idx_member_context_member, columns: [member_id], unique: true }
