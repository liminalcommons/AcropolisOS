Member:
  description: A person belonging to the community
  title_property: full_name
  data_audit: true
  permissions:
    # M3.1 / US-031: tightened from `["*"]` to enforce member_self.
    # A member sees only their own Member row; stewards see all. The wrap
    # layer (wrapObjectAccess in lib/ontology/ctx.ts) resolves member_self
    # via row.id === actor.userId (the actor IS the member).
    read: ["steward", "member_self"]
    write: ["steward", "member_self"]
  properties:
    id:
      type: uuid
      primary_key: true
    full_name:
      type: string
    email:
      ref: email
    joined_at:
      ref: joined_at
    tier:
      type: enum
      values: [basic, sustaining, lifetime]
      default: basic
    notes:
      type: string
      permissions:
        read: ["steward"]
        write: ["steward"]
