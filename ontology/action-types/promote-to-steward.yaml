promote_to_steward:
  description: |
    Promote a member to steward — composes change_tier(lifetime) and emits a
    welcome notification via the notify_member side-effect. Demonstrates
    action-composition (M2.5): the function-backed handler calls another
    action through ctx.actions.X, which records parent_action_audit_id back
    to this row.
  function: promote-to-steward
  parameters:
    member:
      type: ref
      target: Member
      required: true
  permissions: [steward]
  agent_policy: always_confirm
  side_effects: [audit, notify_member]
