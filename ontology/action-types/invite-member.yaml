invite_member:
  description: |
    Generate a single-use invite code + expiry on a placeholder Member row
    and fire notify_member with a /claim?code=<code> link. The invitee then
    runs through /claim to create their UserRecord and link it back via
    Member.user_id.

    Function-backed because we need crypto.randomBytes + result.claim_url
    pass-through to the notify_member side-effect body. Refuses to re-invite
    a Member that already has user_id set (use a steward-only "revoke +
    re-invite" path if/when that becomes a real workflow).
  function: invite-member
  parameters:
    member_id:
      type: ref
      target: Member
      required: true
    expires_in_days:
      type: integer
      required: false
      default: 7
  permissions: [steward]
  agent_policy: auto_apply
  side_effects: [audit, notify_member]
  # M3.8.31: invite_code is redacted from the notify_member body by the
  # dispatcher's redactSensitiveFields() — only claim_url is retained.
  # claim_url already embeds the code as a URL param so the invitee can
  # follow the link; the raw hex secret is not written to inbox/email bodies.
