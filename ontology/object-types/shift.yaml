Shift:
  description: A scheduled work slot (reception, cleaning, kitchen, etc.)
  title_property: label
  permissions:
    read: ["*"]
    write: [steward, manager]
  properties:
    id:
      type: uuid
      primary_key: true
    label:
      type: string
      default: "Imported shift"
    kind:
      type: enum
      values: [reception, cleaning, kitchen, laundry, breakfast, night_audit, social]
      default: reception
    starts_at:
      type: timestamp
      default: "@now"
    duration_hours:
      type: decimal
      default: 8
    claimed_by:
      type: ref
      target: Member
      required: false
    status:
      type: enum
      values: [open, claimed, in_progress, done, missed]
      default: open
    notes:
      type: string
      required: false
